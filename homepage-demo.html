<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutvij Dhotey</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --eng-bg: #0e0e0e;
    --eng-text: #f0ede8;
    --creative-text: #f0ede8;
    --transition: 0.7s cubic-bezier(0.76, 0, 0.24, 1);
  }

  html, body {
    width: 100%; height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    cursor: default;
  }

  /* ── CONTAINER ── */
  .split {
    display: flex;
    width: 100%; height: 100vh;
  }

  /* ── PANELS ── */
  .panel {
    position: relative;
    width: 50%;
    height: 100%;
    overflow: hidden;
    transition: width var(--transition);
    cursor: pointer;
  }

  .split:has(.panel:hover) .panel { width: 40%; }
  .split:has(.panel:hover) .panel:hover { width: 60%; }

  /* ── ENGINEERING PANEL ── */
  .panel--eng {
    background: var(--eng-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel--eng .bg-img {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=1600&q=80');
    background-size: cover;
    background-position: center;
    opacity: 0.18;
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.7s ease;
  }

  .panel--eng:hover .bg-img {
    transform: scale(1.03);
    opacity: 0.25;
  }

  .panel--eng .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to left,
      rgba(14,14,14,0.5) 0%,
      rgba(14,14,14,0.2) 50%,
      rgba(14,14,14,0.4) 100%
    );
  }

  /* ── CREATIVE PANEL ── */
  .panel--creative {
    position: relative;
  }

  .panel--creative .bg-img {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80');
    background-size: cover;
    background-position: center;
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }

  .panel--creative:hover .bg-img {
    transform: scale(1.03);
  }

  .panel--creative .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(0,0,0,0.45) 0%,
      rgba(0,0,0,0.1) 50%,
      rgba(0,0,0,0.2) 100%
    );
    transition: background 0.7s ease;
  }

  .panel--creative:hover .overlay {
    background: linear-gradient(
      to right,
      rgba(0,0,0,0.2) 0%,
      rgba(0,0,0,0.05) 50%,
      rgba(0,0,0,0.15) 100%
    );
  }

  /* ── DIVIDER ── */
  .divider {
    position: fixed;
    left: 50%;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.12);
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
    transition: left var(--transition), opacity 0.4s;
  }

  .split:has(.panel--eng:hover) .divider { left: 60%; opacity: 0.06; }
  .split:has(.panel--creative:hover) .divider { left: 40%; opacity: 0.06; }

  /* ── NAME (centered, spans both) ── */
  .name {
    position: fixed;
    top: 36px;
    left: 0; right: 0;
    text-align: center;
    z-index: 20;
    pointer-events: none;
    letter-spacing: 0.25em;
    font-size: 11px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
    mix-blend-mode: difference;
  }

  /* ── PANEL CONTENT ── */
  .panel__content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
    opacity: 0; /* animated in */
  }

  .panel__label {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 16px;
    transition: color 0.4s, letter-spacing 0.4s;
  }

  .panel:hover .panel__label {
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.4em;
  }

  .panel__heading {
    font-size: clamp(28px, 3.5vw, 52px);
    font-weight: 400;
    line-height: 1.1;
    color: rgba(255,255,255,0.9);
    margin-bottom: 20px;
    transition: opacity 0.4s;
  }

  .panel__sub {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3);
    transition: color 0.4s, transform 0.4s;
    transform: translateY(4px);
  }

  .panel:hover .panel__sub {
    color: rgba(255,255,255,0.55);
    transform: translateY(0);
  }

  /* ── ENTER CTA ── */
  .panel__enter {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    transition: color 0.4s, transform 0.5s;
    white-space: nowrap;
  }

  .panel:hover .panel__enter {
    color: rgba(255,255,255,0.6);
    transform: translateX(-50%) translateY(-4px);
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .split { flex-direction: column; }
    .panel { width: 100% !important; height: 50vh; }
    .divider { display: none; }
    .split:has(.panel:hover) .panel { width: 100%; }
    .name { mix-blend-mode: normal; }
  }
</style>
</head>
<body>

<div class="name">Rutvij Dhotey</div>
<div class="divider"></div>

<div class="split">

  <!-- Engineering -->
  <div class="panel panel--eng" onclick="navigate('engineering')">
    <div class="bg-img"></div>
    <div class="overlay"></div>
    <div class="panel__content">
      <h2 class="panel__heading">Engineering</h2>
      <p class="panel__sub">Work experience &amp; projects</p>
    </div>
    <div class="panel__enter">Enter →</div>
  </div>

  <!-- Creative -->
  <div class="panel panel--creative" onclick="navigate('creative')">
    <div class="bg-img"></div>
    <div class="overlay"></div>
    <div class="panel__content">
      <h2 class="panel__heading">Creative</h2>
      <p class="panel__sub">Travel &amp; photography</p>
    </div>
    <div class="panel__enter">Enter →</div>
  </div>

</div>

<script>
  // Entrance animation
  gsap.to('.panel__content', {
    opacity: 1,
    y: 0,
    duration: 1.4,
    ease: 'power3.out',
    stagger: 0.2,
    delay: 0.3
  });

  gsap.from('.name', {
    opacity: 0,
    y: -10,
    duration: 1.2,
    ease: 'power3.out',
    delay: 0.6
  });

  gsap.from('.divider', {
    scaleY: 0,
    transformOrigin: 'top center',
    duration: 1.4,
    ease: 'power3.inOut',
    delay: 0.2
  });

  // Click transition — expand panel to fill screen, then "navigate"
  function navigate(dest) {
    const panel = document.querySelector(dest === 'engineering' ? '.panel--eng' : '.panel--creative');
    const other = document.querySelector(dest === 'engineering' ? '.panel--creative' : '.panel--eng');

    gsap.to(other, { opacity: 0, duration: 0.4, ease: 'power2.in' });
    gsap.to(panel, {
      width: '100vw',
      duration: 0.7,
      ease: 'power3.inOut',
      onComplete: () => {
        // In the real site, this would be Next.js router.push(`/${dest}`)
        alert(`Navigating to /${dest} — portal not built yet in this demo.`);
        gsap.set(other, { opacity: 1 });
        gsap.set(panel, { width: '50%' });
      }
    });
  }
</script>
</body>
</html>
